name: Deploy DabitOne Manual to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지 — 새 push 시 진행 중 빌드 취소 후 최신 상태로 재시작
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Quartz CreatedModifiedDate가 git history 필요

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build tour app (esbuild Preact bundle)
        run: npm run build:tour

      - name: Quartz build
        run: npx quartz build

      - name: Copy CNAME (custom domain)
        run: cp content/CNAME public/CNAME 2>/dev/null || true

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build PDFs (Reference + Operation)
        run: npm run build:pdf
        continue-on-error: true   # PDF 실패는 사이트 배포를 막지 않음

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
